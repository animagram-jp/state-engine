services:
  app:
    build:
      context: ../../     # crate root (Cargo.toml がある位置)
      dockerfile: examples/app/Dockerfile
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      DB_COMMON_HOST: mysql
      DB_COMMON_PORT: 3306
      DB_COMMON_DATABASE: common
      DB_COMMON_USERNAME: app
      DB_COMMON_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: common
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
